name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache GTFS static data
        if: matrix.task == 'test'
        uses: actions/cache@v4
        with:
          path: packages/server/src/data/gtfs
          key: gtfs-static-v1

      - name: Download GTFS data if not cached
        if: matrix.task == 'test'
        run: |
          if [ ! -f packages/server/src/data/gtfs/stops.json ]; then
            pnpm download-gtfs
          fi

      - run: pnpm ${{ matrix.task }}

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache GTFS static data
        uses: actions/cache@v4
        with:
          path: packages/server/src/data/gtfs
          key: gtfs-static-v1

      - name: Download GTFS data if not cached
        run: |
          if [ ! -f packages/server/src/data/gtfs/stops.json ]; then
            pnpm download-gtfs
          fi

      - name: Install Playwright browsers
        run: pnpm --filter @panoptrain/e2e exec playwright install --with-deps chromium webkit

      - run: pnpm test:e2e

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7
